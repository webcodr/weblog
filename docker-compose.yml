services:
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./:/srv:ro
      - ./../../caddy_data:/data
      - ./../../caddy_config:/config
    networks:
      - caddy

networks:
  caddy:
    enable_ipv6: true
