{{ define "main" }}
<article class="post">
  <h1 class="post-headline">{{ .Title }}</h1>
  {{ range (where .Site.RegularPages "Type" "post").GroupByDate "2006" }}
    <section class="archive-group">
      <h2 class="archive-year">{{ .Key }}</h2>
      <ul class="post-index">
        {{ range .Pages }}
          {{ partial "post-index-entry.html" (dict "page" . "dateFormat" "Jan 02") }}
        {{ end }}
      </ul>
    </section>
  {{ end }}
</article>
{{ end }}
