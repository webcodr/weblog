<!DOCTYPE html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <div class="container container--main">
    <main class="content">
      <article class="post">
        <h1 class="post-headline">Topics</h1>
        <ul class="topic-list">
          {{ range .Data.Terms.ByCount }}
            <li class="topic-list-item">
              <a href="{{ .Page.RelPermalink }}" class="topic-list-link">{{ .Page.LinkTitle | humanize | title }}</a>
              <span class="topic-list-count">{{ .Count }}</span>
            </li>
          {{ end }}
        </ul>
      </article>
    </main>
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
