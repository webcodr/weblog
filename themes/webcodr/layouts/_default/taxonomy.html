<!DOCTYPE html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <div class="container container--main">
    <main class="content">
      <article class="post">
        <h1 class="post-headline">{{ .Title | humanize | title }}</h1>
        <ul class="post-index">
          {{ range .Pages.ByDate.Reverse }}
            {{ partial "post-index-entry.html" (dict "page" . "dateFormat" "Jan 02, 2006") }}
          {{ end }}
        </ul>
      </article>
    </main>
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
