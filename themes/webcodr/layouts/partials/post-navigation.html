{{ if or .PrevInSection .NextInSection }}
  <nav class="post-navigation" aria-label="Article navigation" data-pagefind-ignore>
    {{ with .PrevInSection }}
      <div class="post-navigation-previous">
        <span class="post-navigation-label">
          <svg
            class="post-navigation-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Older
        </span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>
    {{ end }}
    {{ with .NextInSection }}
      <div class="post-navigation-next">
        <span class="post-navigation-label">
          Newer
          <svg
            class="post-navigation-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>
    {{ end }}
  </nav>
{{ end }}
