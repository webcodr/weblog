{{ if or .PrevInSection .NextInSection }}
  <nav class="post-navigation" aria-label="Article navigation">
    {{ with .PrevInSection }}
      <div class="post-navigation-previous"><a href="{{ .RelPermalink }}">&larr; {{ .Title }}</a></div>
    {{ end }}
    {{ with .NextInSection }}
      <div class="post-navigation-next"><a href="{{ .RelPermalink }}">{{ .Title }} &rarr;</a></div>
    {{ end }}
  </nav>
{{ end }}
