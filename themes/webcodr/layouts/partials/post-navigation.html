{{ if or .PrevInSection .NextInSection }}
  <nav class="post-navigation" aria-label="Article navigation" data-pagefind-ignore>
    {{ with .PrevInSection }}
      <div class="post-navigation-previous"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
    {{ end }}
    {{ with .NextInSection }}
      <div class="post-navigation-next"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
    {{ end }}
  </nav>
{{ end }}
