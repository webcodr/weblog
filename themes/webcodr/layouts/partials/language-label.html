{{- $code := .Params.language | default "en" -}}
{{- if ne $code "en" -}}
{{- $labels := dict "de" "Deutsch" "en" "English" -}}
{{- $label := index $labels $code | default ($code | upper) -}}
<span aria-hidden="true"> · </span><span class="post-language" lang="{{ $code }}">{{ $label }}</span>
{{- end -}}
