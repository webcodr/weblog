baseurl: "/"
locale: "en-us"
title: "webcodr"
theme: "webcodr"
enableGitInfo: true
frontmatter:
  lastmod: ["lastmod", ":git", "date", "publishDate"]
params:
  description: >-
    WebCodr is a blog that covers a wide range of programming topics,
    including the Kotlin and Rust programming languages and ways to improve
    developer productivity.
permalinks:
  post: /:year/:month/:slug/
enableRobotsTXT: true
markup:
  highlight:
    codeFences: true
    noClasses: false
sitemap:
  changefreq: monthly
  filename: sitemap.xml
  priority: 0.5
services:
  rss:
    limit: 20
mediaTypes:
  application/feed+json:
    suffixes: ["json"]
outputFormats:
  jsonfeed:
    mediaType: application/feed+json
    baseName: feed
    isPlainText: true
    rel: alternate
outputs:
  home: ["html", "rss", "jsonfeed"]
pagination:
  pagerSize: 5
taxonomies:
  topic: topics
  series: series
related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: topics
      weight: 100
    - name: date
      weight: 10
