name: Deploy on Main Branch or Manually

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: production
    env:
      HUGO_VERSION: "0.163.3"

    steps:
      - name: Compute release paths
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          echo "RELEASE_PATH=releases/${TIMESTAMP}-${{ github.sha }}" >> "$GITHUB_ENV"
          echo "TEMP_RELEASE_PATH=releases/.${TIMESTAMP}-${{ github.sha }}.${{ github.run_id }}.tmp" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build site
        run: hugo

      - name: Build search index
        run: npx -y pagefind@1.5.2 --site public

      - name: Verify build output
        run: |
          test -f public/index.html
          test -f public/pagefind/pagefind.js

      - name: Install deploy dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Prepare remote release directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          REMOTE="${SSH_USERNAME}@${SSH_HOST}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" "bash -s -- '$TEMP_RELEASE_PATH'" <<'REMOTE_SCRIPT'
          set -eu
          TEMP_RELEASE_PATH=$1
          mkdir -p ~/projects/weblog/site/releases
          cd ~/projects/weblog/site
          rm -rf "$TEMP_RELEASE_PATH"
          mkdir -p "$TEMP_RELEASE_PATH"
          REMOTE_SCRIPT

      - name: Upload built site
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          REMOTE="${SSH_USERNAME}@${SSH_HOST}"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" public/ "${REMOTE}:~/projects/weblog/site/${TEMP_RELEASE_PATH}/"

      - name: Activate release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          REMOTE="${SSH_USERNAME}@${SSH_HOST}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" "bash -s -- '$TEMP_RELEASE_PATH' '$RELEASE_PATH'" <<'REMOTE_SCRIPT'
          set -eu
          TEMP_RELEASE_PATH=$1
          RELEASE_PATH=$2
          cd ~/projects/weblog/site
          test -f "$TEMP_RELEASE_PATH/index.html"
          if [ -e "$RELEASE_PATH" ]; then
            test -f "$RELEASE_PATH/index.html"
            rm -rf "$TEMP_RELEASE_PATH"
          else
            mv "$TEMP_RELEASE_PATH" "$RELEASE_PATH"
          fi
          ln -sfn "$RELEASE_PATH" current-new
          mv -Tf current-new current
          test "$(readlink current)" = "$RELEASE_PATH"
          touch "$RELEASE_PATH"
          (ls -1dt releases/* 2>/dev/null | tail -n +6 | xargs -r rm -rf) || true
          REMOTE_SCRIPT

      - name: Smoke test production
        run: |
          curl -fsS https://webcodr.io/ >/dev/null
          curl -fsS https://webcodr.dev/ >/dev/null

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
